<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>COUNTDOWN EVENT | 23RD JUNE, 2026 | | 2026 POLICE TRAINING EVENT | TIMER</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous"/>
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="images/logo.png" type="image/x-icon">
  </head>
  <body>
    <div class="overlay"></div>
      <div class="container countdown-container">
        <div class="text-center">
          <img src="images/logo.png" alt="peace is possible in Nigeria logo" title="peace is possible in Nigeria">
          <span class="d-block text-white">Countdown To Our Next Event</span>
          <h1 class="event-title">2026 POLICE TRAINING EVENT</h1>
           <p class="event-subtitle">23rd June, 2026</p>
        </div>
        <div class="row justify-content-center g-4">
          <div class="col-6 col-md-3">
            <div class="flip-wrapper">
              <div class="flip-card" id="days">
                <span>00</span>
              </div>
              <h5 class="label">Days</h5>
            </div>
          </div>
          <div class="col-6 col-md-3">
            <div class="flip-wrapper">
              <div class="flip-card" id="hours">
                <span>00</span>
              </div>
              <h5 class="label">Hours</h5>
            </div>
          </div>
          <div class="col-6 col-md-3">
            <div class="flip-wrapper">
              <div class="flip-card" id="minutes">
                <span>00</span>
              </div>
              <h5 class="label padding-bottom">Minutes</h5>
            </div>
          </div>
          <div class="col-6 col-md-3">
            <div class="flip-wrapper">
              <div class="flip-card" id="seconds">
                <span>00</span>
              </div>
              <h5 class="label padding-bottom">Seconds</h5>
            </div>
          </div>
        </div>
        <div class="text-center mb-4">
          <h3 id="dynamic-text-label" class="text-white fw-light"></h3>
        </div>
      </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script src="app.js"></script>
  </body>
</html>
